repo_path: "."
output_dir: "./.nlm_pack"
max_words: 200000
skip_dirs:
  - ".git"
  - "node_modules"
  - "dist"
  - "build"
  - "__pycache__"
  - ".venv"
  - "venv"
skip_patterns:
  - "*.png"
  - "*.jpg"
  - "*.jpeg"
  - "*.gif"
  - "*.pdf"
  - "*.bin"
  - "*.zip"
  - "*.tar.gz"
include_extensions:
  - ".ts"
  - ".js"
  - ".py"
  - ".md"
  - ".json"
  - ".yaml"
  - ".yml"
  - ".sh"
  - ".ps1"
