<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KB-Sync Validation Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Libre+Baskerville:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0806;
      --forge: #1a1410;
      --iron: #2c2420;
      --rust: #8B3A1A;
      --ember: #C4501A;
      --brass: #B8922A;
      --ash: #9a9088;
      --bone: #e8e0d4;
      --paper: #f2ece2;
      --white: #faf6f0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Libre Baskerville', serif;
      background: var(--black);
      color: var(--bone);
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' result='noise' /%3E%3C/filter%3E%3Crect width='400' height='400' fill='%230a0806' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
      z-index: 1;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    header {
      margin-bottom: 4rem;
      text-align: center;
      border-bottom: 1px solid;
      border-image: linear-gradient(to right, transparent, rgba(196, 80, 26, 0.4), transparent) 1;
      padding-bottom: 3rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
      color: var(--white);
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--rust);
      font-weight: 700;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .card {
      background: rgba(26, 20, 16, 0.6);
      border: 1px solid rgba(154, 144, 136, 0.12);
      padding: 2rem;
      transition: border-color 0.3s ease;
    }

    .card:hover {
      border-color: rgba(196, 80, 26, 0.4);
    }

    .metric {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 1rem;
      font-weight: 700;
    }

    .value {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--white);
    }

    .value.warning {
      color: var(--brass);
    }

    .value.error {
      color: var(--ember);
    }

    .timestamp {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--ash);
      margin-top: 0.5rem;
    }

    .snapshots {
      margin-bottom: 4rem;
    }

    .snapshots h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--white);
      border-bottom: 1px solid;
      border-image: linear-gradient(to right, transparent, rgba(196, 80, 26, 0.4), transparent) 1;
      padding-bottom: 1rem;
    }

    .snapshot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .snapshot-card {
      background: rgba(26, 20, 16, 0.6);
      border: 1px solid rgba(154, 144, 136, 0.12);
      padding: 1.5rem;
      transition: border-color 0.3s ease;
    }

    .snapshot-card:hover {
      border-color: rgba(196, 80, 26, 0.4);
    }

    .snapshot-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
      gap: 1rem;
    }

    .snapshot-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--brass);
      word-break: break-all;
      font-weight: 600;
    }

    .snapshot-status {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status-badge {
      font-family: 'Barlow Condensed', sans-serif;
      padding: 0.4rem 0.8rem;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      border: 1px solid;
    }

    .status-badge.success {
      border-color: rgba(139, 58, 26, 0.5);
      background: rgba(139, 58, 26, 0.08);
      color: var(--brass);
    }

    .status-badge.warning {
      border-color: rgba(196, 80, 26, 0.5);
      background: rgba(196, 80, 26, 0.08);
      color: var(--ember);
    }

    .status-badge.error {
      border-color: rgba(196, 80, 26, 0.6);
      background: rgba(196, 80, 26, 0.12);
      color: var(--ember);
    }

    .snapshot-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      font-size: 0.9rem;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(154, 144, 136, 0.08);
      padding-bottom: 0.5rem;
    }

    .stat-label {
      color: var(--ash);
      font-size: 0.8rem;
    }

    .stat-value {
      color: var(--white);
      font-weight: 700;
    }

    .stat-value.error-text {
      color: var(--ember);
    }

    .stat-value.warning-text {
      color: var(--brass);
    }

    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--ash);
      grid-column: 1 / -1;
    }

    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--bone);
    }

    .empty-desc {
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    button {
      font-family: 'Barlow Condensed', sans-serif;
      background: rgba(26, 20, 16, 0.6);
      border: 1px solid rgba(196, 80, 26, 0.3);
      color: var(--ember);
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    button:hover {
      border-color: rgba(196, 80, 26, 0.6);
      background: rgba(196, 80, 26, 0.08);
    }

    button:active {
      transform: translateY(-1px);
    }

    .footer {
      text-align: center;
      padding-top: 3rem;
      border-top: 1px solid rgba(154, 144, 136, 0.12);
      color: var(--ash);
      font-size: 0.8rem;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 0.15em;
    }

    .info-box {
      background: rgba(44, 36, 32, 0.4);
      border-left: 3px solid var(--ember);
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      line-height: 1.6;
      border: 1px solid rgba(196, 80, 26, 0.15);
      border-left: 3px solid var(--ember);
    }

    code {
      background: rgba(44, 36, 32, 0.8);
      color: var(--brass);
      padding: 0.2rem 0.4rem;
      font-family: 'Barlow Condensed', monospace;
      font-size: 0.85rem;
    }

    .hidden {
      display: none;
    }

    .empty-help {
      font-size: 0.8rem;
      margin-top: 0.75rem;
      color: var(--ash);
    }

    .code-example {
      background: rgba(44, 36, 32, 0.8);
      color: var(--brass);
      padding: 0.15rem 0.35rem;
      border-left: 2px solid var(--ember);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2.2rem;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .value {
        font-size: 2rem;
      }

      .snapshot-grid {
        grid-template-columns: 1fr;
      }

      body {
        padding: 1rem;
      }

      header {
        margin-bottom: 2rem;
        padding-bottom: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>KB-Sync Validation Dashboard</h1>
      <p class="subtitle">Real-time staging validator results</p>
    </header>

    <div class="info-box hidden" id="infoBox">
      <strong>Report Status —</strong> <span id="infoText"></span>
    </div>

    <div class="summary" id="summary">
      <div class="card">
        <div class="metric">Total Files</div>
        <div class="value">-</div>
      </div>
      <div class="card">
        <div class="metric">Errors</div>
        <div class="value error">-</div>
      </div>
      <div class="card">
        <div class="metric">Warnings</div>
        <div class="value warning">-</div>
      </div>
      <div class="card">
        <div class="metric">Duration</div>
        <div class="value">-</div>
      </div>
    </div>

    <div class="controls">
      <button type="button" onclick="loadReport()">Refresh</button>
      <button type="button" onclick="downloadJSON()">Export JSON</button>
      <button type="button" onclick="clearCache()">Clear Cache</button>
    </div>

    <div class="snapshots">
      <h2>Snapshots</h2>
      <div class="snapshot-grid" id="snapshotGrid">
        <div class="empty">
          <p class="empty-title">No Validation Report</p>
          <p class="empty-desc">Run validation to generate report data</p>
          <p class="empty-help">
            Run: <code class="code-example">npm run wiki:validate-batch</code>
          </p>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>KB-Sync v1.5.0 • Validation Dashboard</p>
    </div>
  </div>

  <script>
    const REPORT_FILE = '.validation-report.json';
    const CACHE_KEY = 'kb-sync-report-cache';

    async function loadReport() {
      try {
        const response = await fetch(REPORT_FILE, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        renderReport(data);
      } catch (error) {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
          showInfo(`Using cached report (live load failed: ${error.message})`);
          renderReport(JSON.parse(cached));
        } else {
          showEmpty(`Failed to load report: ${error.message}`);
        }
      }
    }

    function renderReport(data) {
      const summary = data.summary || {};
      const results = data.results || [];
      const timestamp = data.timestamp ? new Date(data.timestamp) : null;

      // Update summary cards
      const cards = document.querySelectorAll('.card');
      cards[0].querySelector('.value').textContent = summary.files || 0;
      cards[1].querySelector('.value').textContent = summary.errors || 0;
      cards[2].querySelector('.value').textContent = summary.warnings || 0;
      cards[3].querySelector('.value').textContent = formatDuration(data.duration || 0);

      // Update timestamp
      if (timestamp) {
        cards[0].querySelector('.value').insertAdjacentHTML('afterend',
          `<div class="timestamp">${timestamp.toLocaleString()}</div>`);
      }

      // Render snapshots
      const grid = document.getElementById('snapshotGrid');
      if (results.length === 0) {
        showEmpty('No snapshot results found');
        return;
      }

      grid.innerHTML = results.map((snap, idx) => {
        const name = snap.target.split('\\').pop() || snap.target;
        const hasErrors = snap.errors > 0;
        const hasWarnings = snap.warnings > 0;

        return `
          <div class="snapshot-card">
            <div class="snapshot-header">
              <div class="snapshot-name" title="${snap.target}">${name}</div>
              <div class="snapshot-status">
                ${hasErrors ? '<div class="status-badge error">ERRORS</div>' : ''}
                ${hasWarnings && !hasErrors ? '<div class="status-badge warning">WARNINGS</div>' : ''}
                ${!hasErrors && !hasWarnings ? '<div class="status-badge success">PASS</div>' : ''}
              </div>
            </div>
            <div class="snapshot-stats">
              <div class="stat-item">
                <span class="stat-label">Files</span>
                <span class="stat-value">${snap.files}</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Errors</span>
                <span class="stat-value${snap.errors > 0 ? ' error-text' : ''}">${snap.errors}</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Warnings</span>
                <span class="stat-value${snap.warnings > 0 ? ' warning-text' : ''}">${snap.warnings}</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Details</span>
                <span class="stat-value">${snap.target.split('\\').slice(-2).join('\\')}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function formatDuration(ms) {
      if (ms < 1000) return `${ms}ms`;
      return `${(ms / 1000).toFixed(1)}s`;
    }

    function showEmpty(message) {
      document.getElementById('snapshotGrid').innerHTML = `
        <div class="empty">
          <p class="empty-title">Report Error</p>
          <p class="empty-desc">${message}</p>
        </div>
      `;
    }

    function showInfo(message) {
      const box = document.getElementById('infoBox');
      document.getElementById('infoText').textContent = message;
      box.classList.remove('hidden');
    }

    function downloadJSON() {
      const cached = localStorage.getItem(CACHE_KEY);
      if (!cached) {
        alert('No report data to export. Run validation first.');
        return;
      }
      const data = JSON.parse(cached);
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `validation-report-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearCache() {
      localStorage.removeItem(CACHE_KEY);
      location.reload();
    }

    // Load on page load
    window.addEventListener('load', loadReport);
  </script>
</body>
</html>
