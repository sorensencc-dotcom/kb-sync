<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KB-Sync Validation Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 40px;
      text-align: center;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.95em;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(100, 116, 139, 0.3);
      border-radius: 12px;
      padding: 24px;
      backdrop-filter: blur(10px);
      transition: transform 0.2s, border-color 0.2s;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(100, 116, 139, 0.5);
    }

    .metric {
      font-size: 0.85em;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .value {
      font-size: 2.5em;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .value.success { color: #34d399; }
    .value.warning { color: #fbbf24; }
    .value.error { color: #f87171; }

    .timestamp {
      font-size: 0.8em;
      color: #64748b;
    }

    .snapshots {
      margin-bottom: 40px;
    }

    .snapshots h2 {
      font-size: 1.5em;
      margin-bottom: 20px;
      color: #cbd5e1;
    }

    .snapshot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .snapshot-card {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(100, 116, 139, 0.3);
      border-radius: 8px;
      padding: 16px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .snapshot-card:hover {
      background: rgba(30, 41, 59, 1);
      border-color: rgba(100, 116, 139, 0.6);
      transform: translateY(-1px);
    }

    .snapshot-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .snapshot-name {
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 0.85em;
      color: #60a5fa;
      word-break: break-all;
    }

    .snapshot-status {
      display: flex;
      gap: 8px;
    }

    .status-badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-badge.success {
      background: rgba(52, 211, 153, 0.2);
      color: #34d399;
    }

    .status-badge.warning {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
    }

    .status-badge.error {
      background: rgba(248, 113, 113, 0.2);
      color: #f87171;
    }

    .snapshot-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 0.85em;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      color: #cbd5e1;
    }

    .stat-label {
      color: #94a3b8;
    }

    .stat-value {
      font-weight: 600;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }

    .empty-icon {
      font-size: 3em;
      margin-bottom: 10px;
      opacity: 0.5;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    button {
      background: rgba(96, 165, 250, 0.1);
      border: 1px solid rgba(96, 165, 250, 0.3);
      color: #60a5fa;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.2s;
    }

    button:hover {
      background: rgba(96, 165, 250, 0.2);
      border-color: rgba(96, 165, 250, 0.6);
    }

    button:active {
      transform: scale(0.98);
    }

    .footer {
      text-align: center;
      padding-top: 40px;
      border-top: 1px solid rgba(100, 116, 139, 0.2);
      color: #64748b;
      font-size: 0.85em;
    }

    .info-box {
      background: rgba(3, 102, 214, 0.1);
      border-left: 3px solid #0366d6;
      padding: 12px 16px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 0.9em;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.75em;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .value {
        font-size: 2em;
      }

      .snapshot-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>KB-Sync Validation Dashboard</h1>
      <p class="subtitle">Real-time staging validator results</p>
    </header>

    <div class="info-box" id="infoBox" style="display: none;">
      <strong>Report Status:</strong> <span id="infoText"></span>
    </div>

    <div class="summary" id="summary">
      <div class="card">
        <div class="metric">Total Files</div>
        <div class="value">-</div>
      </div>
      <div class="card">
        <div class="metric">Errors</div>
        <div class="value error">-</div>
      </div>
      <div class="card">
        <div class="metric">Warnings</div>
        <div class="value warning">-</div>
      </div>
      <div class="card">
        <div class="metric">Duration</div>
        <div class="value">-</div>
      </div>
    </div>

    <div class="controls">
      <button onclick="loadReport()">Refresh</button>
      <button onclick="downloadJSON()">Export JSON</button>
      <button onclick="clearCache()">Clear Cache</button>
    </div>

    <div class="snapshots">
      <h2>Snapshots</h2>
      <div class="snapshot-grid" id="snapshotGrid">
        <div class="empty">
          <div class="empty-icon">📊</div>
          <p>No validation report found</p>
          <p style="font-size: 0.85em; margin-top: 8px; color: #64748b;">
            Run: <code style="background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 3px;">npm run wiki:validate-batch</code>
          </p>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>KB-Sync v1.5.0 • Validation Dashboard</p>
    </div>
  </div>

  <script>
    const REPORT_FILE = '.validation-report.json';
    const CACHE_KEY = 'kb-sync-report-cache';

    async function loadReport() {
      try {
        const response = await fetch(REPORT_FILE, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        renderReport(data);
      } catch (error) {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
          showInfo(`Using cached report (live load failed: ${error.message})`);
          renderReport(JSON.parse(cached));
        } else {
          showEmpty(`Failed to load report: ${error.message}`);
        }
      }
    }

    function renderReport(data) {
      const summary = data.summary || {};
      const results = data.results || [];
      const timestamp = data.timestamp ? new Date(data.timestamp) : null;

      // Update summary cards
      const cards = document.querySelectorAll('.card');
      cards[0].querySelector('.value').textContent = summary.files || 0;
      cards[1].querySelector('.value').textContent = summary.errors || 0;
      cards[2].querySelector('.value').textContent = summary.warnings || 0;
      cards[3].querySelector('.value').textContent = formatDuration(data.duration || 0);

      // Update timestamp
      if (timestamp) {
        cards[0].querySelector('.value').insertAdjacentHTML('afterend',
          `<div class="timestamp">${timestamp.toLocaleString()}</div>`);
      }

      // Render snapshots
      const grid = document.getElementById('snapshotGrid');
      if (results.length === 0) {
        showEmpty('No snapshot results found');
        return;
      }

      grid.innerHTML = results.map((snap, idx) => {
        const name = snap.target.split('\\').pop() || snap.target;
        const hasErrors = snap.errors > 0;
        const hasWarnings = snap.warnings > 0;

        return `
          <div class="snapshot-card">
            <div class="snapshot-header">
              <div class="snapshot-name" title="${snap.target}">${name}</div>
              <div class="snapshot-status">
                ${hasErrors ? '<div class="status-badge error">ERRORS</div>' : ''}
                ${hasWarnings && !hasErrors ? '<div class="status-badge warning">WARNINGS</div>' : ''}
                ${!hasErrors && !hasWarnings ? '<div class="status-badge success">PASS</div>' : ''}
              </div>
            </div>
            <div class="snapshot-stats">
              <div class="stat-item">
                <span class="stat-label">Files</span>
                <span class="stat-value">${snap.files}</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Errors</span>
                <span class="stat-value" style="color: ${snap.errors > 0 ? '#f87171' : '#34d399'}">${snap.errors}</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Warnings</span>
                <span class="stat-value" style="color: ${snap.warnings > 0 ? '#fbbf24' : '#34d399'}">${snap.warnings}</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Details</span>
                <span class="stat-value">${snap.target.split('\\').slice(-2).join('\\')}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function formatDuration(ms) {
      if (ms < 1000) return `${ms}ms`;
      return `${(ms / 1000).toFixed(1)}s`;
    }

    function showEmpty(message) {
      document.getElementById('snapshotGrid').innerHTML = `
        <div class="empty" style="grid-column: 1 / -1;">
          <div class="empty-icon">📭</div>
          <p>${message}</p>
        </div>
      `;
    }

    function showInfo(message) {
      const box = document.getElementById('infoBox');
      document.getElementById('infoText').textContent = message;
      box.style.display = 'block';
    }

    function downloadJSON() {
      const cached = localStorage.getItem(CACHE_KEY);
      if (!cached) {
        alert('No report data to export. Run validation first.');
        return;
      }
      const data = JSON.parse(cached);
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `validation-report-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearCache() {
      localStorage.removeItem(CACHE_KEY);
      location.reload();
    }

    // Load on page load
    window.addEventListener('load', loadReport);
  </script>
</body>
</html>
