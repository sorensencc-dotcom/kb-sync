# ==============================================================================
# Global Configuration for kb-sync Core Scripts
# Shared by all sync targets (NotebookLM, Obsidian, etc.)
# ==============================================================================

# Size thresholds (in bytes)
warning_bytes: 5000000  # 5MB — warn if pack approaches this
hard_bytes: 8000000     # 8MB — require chunking if exceeded

# Chunk size for line-safe splitting (split -C format: e.g., 4M, 100K)
chunk_size: 4M

# File exclusion patterns (glob format, matched against repo-relative paths)
skip_patterns:
  - package-lock.json
  - yarn.lock
  - pnpm-lock.yaml
  - "*node_modules/*"
  - "*dist/*"
  - "*build/*"
  - "*.png"
  - "*.jpg"
  - "*.jpeg"
  - "*.gif"
  - "*.pdf"
  - "*.bin"
  - "*playwright-report/*"
  - "*coverage/*"

# Timeout and Retry Policy
automation:
  bash_workspace:
    timeout_ms: 90000              # Increase from default 30-45s
    retry_attempts: 3
    retry_backoff_ms: [5000, 15000, 30000]
    skip_on_failure: false          # Don't skip to next stage if timeout
    alert_on_failure: true
    alert_recipients:
      - "sorensencc@gmail.com"

